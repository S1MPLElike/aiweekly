# air.toml
root = "."
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "tmp/main.exe"
  cmd = "go build -o tmp/main.exe cmd/server/main.go"
  delay = 1000
  exclude_dir = ["tmp", "vendor"]
  exclude_file = []
  exclude_regex = []
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = ["cmd", "internal"]
  include_ext = ["go"]
  kill_delay = 500
  log = "build-errors.log"
  send_interrupt = false
  stop_on_error = true

[color]
  app = "magenta"
  build = "yellow"
  main = "cyan"
  runner = "green"
  watcher = "blue"

[log]
  time = false

[watcher]
  allow = []
  ignore = []
  interval = 500